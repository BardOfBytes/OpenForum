version: "3.8"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - NEXT_PUBLIC_FRONTEND_URL=http://localhost:3000
      - UPSTASH_REDIS_URL=redis://redis:6379
      - UPSTASH_REDIS_TOKEN=local-dev-token
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
